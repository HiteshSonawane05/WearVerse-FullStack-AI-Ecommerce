<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Clothes Store</title>
    <link rel="stylesheet" href="../static/css/login.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="home.html" class="logo">WearVerse.</a>
        <div class="nav-links">
            <a href="products.html">Products</a>
            <a href="register.html">Register</a>
        </div>
    </nav>

    <!-- LOGIN FORM -->
    <div class="login-wrapper">
        <div class="login-box">

            <h1>Sign In</h1>
            <p class="subtitle">Welcome back. Enter your details below.</p>

            <div class="error-msg" id="errorMsg"></div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>

            <button class="btn-login" id="loginBtn" onclick="loginUser()">SIGN IN</button>

            <p class="register-link">
                New customer? <a href="register.html">Create account</a>
            </p>

        </div>
    </div>

    <script src="../static/js/login.js"></script>
</body>
</html>
