<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details — Clothes Store</title>
    <link rel="stylesheet" href="../static/css/product_details.css">
    <link rel="stylesheet" href="../static/css/chatbot.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="home.html" class="logo">WearVerse.</a>
        <div class="nav-links">
            <a href="products.html">Products</a>
            <a href="cart.html">Cart</a>
            <a href="login.html" id="authLink">Sign In</a>
        </div>
    </nav>

    <!-- PRODUCT DETAILS -->
    <div class="product-wrapper" id="productWrapper">

        <!-- LEFT - IMAGE -->
        <div class="product-image">
            <div class="image-placeholder">NO IMAGE</div>
        </div>

        <!-- RIGHT - INFO -->
        <div class="product-info">

            <p class="product-category" id="productCategory"></p>
            <h1 class="product-name" id="productName"></h1>
            <p class="product-price" id="productPrice"></p>
            <p class="product-stock" id="productStock"></p>

            <div class="quantity-row">
                <label>Quantity</label>
                <div class="quantity-box">
                    <button onclick="decreaseQty()">−</button>
                    <span id="qtyValue">1</span>
                    <button onclick="increaseQty()">+</button>
                </div>
            </div>

            <!-- messages -->
            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>

            <button class="btn-addcart" id="addCartBtn" onclick="addToCart()">ADD TO CART</button>

            <a href="products.html" class="btn-back">← Back to Products</a>

        </div>

    </div>

    <!-- loading state -->
    <div class="loading" id="loadingMsg">LOADING...</div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 Style Co. All rights reserved.</p>
    </footer>

    <script src="../static/js/product_details.js"></script>

    <!-- Chatbot Bubble -->
    <div class="chat-bubble" id="chatBubble" onclick="toggleChat()">
        <span class="chat-icon">💬</span>
    </div>

    <!-- Chatbot Window -->
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="chat-logo">
                     W
                    <div class="chat-status-dot"></div>
                </div>
                <div>
                    <div class="chat-title">WearVerse Assistant</div>
                    <div class="chat-subtitle">Ask me anything!</div>
                </div>
            </div>
            <button class="chat-close" onclick="toggleChat()">✕</button>
        </div>

        <div class="chat-modes">
            <button class="mode-btn active" id="btn-query" onclick="setMode('query')">Products</button>
            <button class="mode-btn" id="btn-policy" onclick="setMode('policy')">Policy</button>
            <button class="mode-btn" id="btn-agent" onclick="setMode('agent')">Orders</button>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="msg msg-bot">Hi! 👋 I am your WearVerse Assistant.<br>Select a mode and ask me anything!</div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)"/>
            <button class="chat-send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script src="../static/js/chatbot.js"></script>
</body>
</html>
