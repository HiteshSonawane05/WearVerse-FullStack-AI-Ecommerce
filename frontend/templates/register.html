<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Clothes Store</title>
    <link rel="stylesheet" href="../static/css/register.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="home.html" class="logo">WearVerse.</a>
        <div class="nav-links">
            <a href="products.html">Products</a>
            <a href="login.html">Sign In</a>
        </div>
    </nav>

    <!-- REGISTER FORM -->
    <div class="register-wrapper">
        <div class="register-box">

            <h1>Create Account</h1>
            <p class="subtitle">Join us and start shopping today.</p>

            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>

            <button class="btn-register" id="registerBtn" onclick="registerUser()">CREATE ACCOUNT</button>

            <p class="login-link">
                Already have an account? <a href="login.html">Sign in</a>
            </p>

        </div>
    </div>

    <script src="../static/js/register.js"></script>
</body>
</html>
